<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Skins — Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #0a0c0f;
            --panel:       #111318;
            --panel2:      #181c24;
            --border:      #1e2330;
            --border-lit:  #2e3550;
            --green:       #39ff8a;
            --green-dim:   rgba(57,255,138,.12);
            --green-glow:  rgba(57,255,138,.25);
            --gold:        #ffc84a;
            --gold-dim:    rgba(255,200,74,.1);
            --red:         #ff4a6b;
            --text:        #b8c4d8;
            --text-bright: #dce8f8;
            --muted:       #454e68;
            --covert:      #eb4b4b;
            --classified:  #d32ce6;
            --restricted:  #4b69ff;
            --milspec:     #5e98d9;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Oxanium', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* scanline overlay */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,.08) 2px,
                rgba(0,0,0,.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* grid bg */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(57,255,138,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57,255,138,.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            height: 58px;
            background: rgba(10,12,15,.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .back-btn {
            display: flex; align-items: center; gap: 6px;
            color: var(--muted); text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
            transition: color .2s;
        }
        .back-btn:hover { color: var(--green); }
        .back-btn::before { content: '←'; font-size: 14px; }

        .site-title {
            font-size: 18px; font-weight: 800; letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--text-bright);
        }
        .site-title span { color: var(--green); }

        /* balance */
        .balance-block {
            display: flex; align-items: center; gap: 0;
            border: 1px solid rgba(255,200,74,.2);
            border-radius: 3px;
            overflow: hidden;
        }
        .balance-label {
            padding: 6px 10px;
            background: rgba(255,200,74,.08);
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
            color: var(--gold);
            border-right: 1px solid rgba(255,200,74,.2);
        }
        .balance-value {
            padding: 6px 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px; color: var(--gold); font-weight: 600;
        }

        /* ── MAIN ── */
        main {
            position: relative; z-index: 1;
            max-width: 1080px; margin: 0 auto;
            padding: 32px 20px 80px;
        }

        .page-header {
            display: flex; align-items: flex-end; justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            font-size: 26px; font-weight: 800; letter-spacing: .15em;
            text-transform: uppercase; color: var(--text-bright);
            line-height: 1;
        }
        .page-header h1 span { color: var(--green); }
        .listing-meta {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; color: var(--muted); letter-spacing: .1em;
        }

        /* ── SKIN GRID ── */
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(186px, 1fr));
            gap: 12px;
        }

        .skin-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            display: flex; flex-direction: column;
            transition: border-color .2s, transform .2s, box-shadow .2s;
            animation: fadeUp .35s both;
        }
        .skin-card:hover {
            border-color: var(--border-lit);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,.5);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .skin-card:nth-child(1) { animation-delay: .05s }
        .skin-card:nth-child(2) { animation-delay: .1s }
        .skin-card:nth-child(3) { animation-delay: .15s }
        .skin-card:nth-child(4) { animation-delay: .2s }
        .skin-card:nth-child(5) { animation-delay: .25s }

        /* image area */
        .skin-img-area {
            height: 110px;
            background: #0d1018;
            display: flex; align-items: center; justify-content: center;
            font-size: 44px;
            position: relative;
            overflow: hidden;
        }
        .skin-img-area::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 3px;
        }
        .rarity-covert     .skin-img-area::after { background: var(--covert); box-shadow: 0 0 8px var(--covert); }
        .rarity-classified .skin-img-area::after { background: var(--classified); box-shadow: 0 0 8px var(--classified); }
        .rarity-restricted .skin-img-area::after { background: var(--restricted); box-shadow: 0 0 8px var(--restricted); }
        .rarity-milspec    .skin-img-area::after { background: var(--milspec); box-shadow: 0 0 8px var(--milspec); }

        /* rarity corner tag */
        .rarity-tag {
            position: absolute; top: 7px; right: 7px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 2px;
            background: rgba(0,0,0,.6);
        }
        .rarity-covert     .rarity-tag { color: var(--covert);     border: 1px solid var(--covert); }
        .rarity-classified .rarity-tag { color: var(--classified); border: 1px solid var(--classified); }
        .rarity-restricted .rarity-tag { color: var(--restricted); border: 1px solid var(--restricted); }
        .rarity-milspec    .rarity-tag { color: var(--milspec);    border: 1px solid var(--milspec); }

        /* card body */
        .skin-body { padding: 12px 13px 13px; flex: 1; display: flex; flex-direction: column; }

        .skin-weapon {
            font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 3px;
        }
        .skin-name {
            font-size: 14px; font-weight: 700; color: var(--text-bright);
            margin-bottom: 8px; line-height: 1.2;
        }

        .skin-data {
            display: flex; gap: 6px; margin-bottom: 10px;
        }
        .data-pill {
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; padding: 2px 7px;
            border-radius: 2px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .data-pill.float-val { color: var(--text); }

        .skin-price {
            font-family: 'Share Tech Mono', monospace;
            font-size: 17px; color: var(--gold); font-weight: 600;
            margin-bottom: 11px;
        }
        .skin-price::before { content: '$ '; font-size: 12px; color: rgba(255,200,74,.5); }

        /* qty + buy */
        .buy-row {
            display: flex; gap: 6px; margin-top: auto;
        }
        .qty-wrap {
            display: flex; align-items: center;
            border: 1px solid var(--border); border-radius: 3px;
            overflow: hidden; background: var(--bg);
        }
        .qty-btn {
            width: 24px; height: 32px;
            background: var(--panel2); border: none;
            color: var(--text); font-size: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s;
            font-family: 'Share Tech Mono', monospace;
        }
        .qty-btn:hover { background: var(--border-lit); color: var(--green); }
        .qty-input {
            width: 36px; height: 32px;
            background: transparent; border: none;
            color: var(--text-bright);
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px; text-align: center;
            outline: none;
            -moz-appearance: textfield;
        }
        .qty-input::-webkit-outer-spin-button,
        .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .buy-btn {
            flex: 1; height: 32px;
            background: var(--green-dim);
            border: 1px solid rgba(57,255,138,.3);
            border-radius: 3px;
            color: var(--green);
            font-family: 'Oxanium', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            cursor: pointer;
            transition: background .2s, box-shadow .2s, color .2s;
        }
        .buy-btn:hover {
            background: var(--green);
            color: var(--bg);
            box-shadow: 0 0 14px var(--green-glow);
        }
        .buy-btn:active { transform: scale(.97); }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(12px);
            padding: 10px 20px;
            background: var(--panel);
            border-radius: 3px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            opacity: 0; pointer-events: none;
            transition: opacity .22s, transform .22s;
            z-index: 1000;
            white-space: nowrap;
        }
        #toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.ok     { border: 1px solid rgba(57,255,138,.4); color: var(--green); }
        #toast.err    { border: 1px solid rgba(255,74,107,.4); color: var(--red); }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a class="back-btn" href="Shop.html">Shop</a>
        <span class="site-title">SKIN<span>MARKET</span></span>
    </div>
    <div class="balance-block">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="balanceDisplay">—</span>
    </div>
</header>

<main>
    <div class="page-header">
        <h1>Buy <span>Skins</span></h1>
        <span class="listing-meta">5 LISTINGS AVAILABLE</span>
    </div>

    <div class="skin-grid" id="shopContainer"></div>
</main>

<div id="toast"></div>

<script src="../MenuLogic.js"></script>
<script src="../UserInfo.js"></script>
<script>

const SHOP_SKINS = [
    { skinName: "Asiimov",          weaponName: "AWP",    weapon: "Gun", floatVal: 0.2412, price: 1200, rarity: "classified", img: "/images/AWP_Asiimov.png" },
    { skinName: "Hyper Beast",      weaponName: "M4A4",   weapon: "Gun", floatVal: 0.0823, price: 800,  rarity: "classified", img: "/images/M4A4_Hyperbeast.png" },
    { skinName: "Redline",          weaponName: "AK-47",  weapon: "Gun", floatVal: 0.1547, price: 220,  rarity: "restricted", img: "/images/AK-47_Redline.png" },
    { skinName: "Orion",            weaponName: "AWP",    weapon: "Gun", floatVal: 0.0411, price: 3500, rarity: "covert",     img: "/images/AWP_Orion.png" },
    { skinName: "Hot Rod",          weaponName: "M4A1-S", weapon: "Gun", floatVal: 0.0134, price: 450,  rarity: "milspec",    img: "/images/M4A1-S_hotrod.png" }
];

function updateBalanceDisplay() {
    document.getElementById('balanceDisplay').textContent = '$' + player.getStorage().getBalance().toLocaleString();
}

let toastTimer;
function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 2200);
}

function adjustQty(index, delta) {
    const input = document.getElementById('qty' + index);
    const val = Math.max(1, Math.min(99, (parseInt(input.value) || 1) + delta));
    input.value = val;
}

function buySkin(index) {
    const quantity = Math.max(1, parseInt(document.getElementById('qty' + index).value) || 1);
    const skin = SHOP_SKINS[index];
    const total = skin.price * quantity;
    const storage = player.getStorage();
    const balance = storage.getBalance();

    if (balance < total) {
        showToast(`Need $${total.toLocaleString()} — only $${balance.toLocaleString()} available`, 'err');
        return;
    }

    storage.deductBalance(total);

    for (let i = 0; i < quantity; i++) {
        storage.addSkin({ ...skin });
    }

    updateBalanceDisplay();
    showToast(`Bought ${quantity}× ${skin.weaponName} | ${skin.skinName}`, 'ok');
}

function renderShop() {
    const container = document.getElementById('shopContainer');
    container.innerHTML = '';

    SHOP_SKINS.forEach((skin, index) => {
        const div = document.createElement('div');
        div.className = `skin-card rarity-${skin.rarity}`;
        div.innerHTML = `
            <div class="skin-img-area">
                ${skin.img ? `<img src="../${skin.img}" style="max-height:90%;max-width:90%;object-fit:contain;">` : `<span>${skin.emoji}</span>`}
                <span class="rarity-tag">${skin.rarity}</span>
            </div>
            <div class="skin-body">
                <div class="skin-weapon">${skin.weaponName}</div>
                <div class="skin-name">${skin.skinName}</div>
                <div class="skin-data">
                    <span class="data-pill float-val">F: ${skin.floatVal}</span>
                    <span class="data-pill">${skin.weapon}</span>
                </div>
                <div class="skin-price">${skin.price.toLocaleString()}</div>
                <div class="buy-row">
                    <div class="qty-wrap">
                        <button class="qty-btn" onclick="adjustQty(${index}, -1)">−</button>
                        <input class="qty-input" type="number" id="qty${index}" value="1" min="1" max="99">
                        <button class="qty-btn" onclick="adjustQty(${index}, 1)">+</button>
                    </div>
                    <button class="buy-btn" onclick="buySkin(${index})">Buy</button>
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

document.addEventListener('DOMContentLoaded', function() {
    renderShop();
    updateBalanceDisplay();
});

</script>
</body>
</html>
