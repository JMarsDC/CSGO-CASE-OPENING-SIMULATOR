<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Menu.css">
</head>
<body>
    <header>
        <a href="TitleScreen.html" style="text-decoration: none; color: inherit;">
            <span class="site-title">CSGO<span>SIMULATOR</span></span>
        </a>
    </header>

    <main>
        <div class="page-title"><span>Register</span></div>
        <div class="page-subtitle">Create a new account</div>

        <div class="form-container">
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="form-submit">Register</button>
            </form>

            <div class="form-link">
                Already have an account? <a href="Login.html">Login here</a>
            </div>
        </div>
    </main>

    <script src="MenuLogic.js"></script>
    <script src="RegisterLogic.js"></script>
</body>
</html>
