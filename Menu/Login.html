<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Menu.css">
</head>
<body>
    <header>
        <a href="TitleScreen.html" style="text-decoration: none; color: inherit;">
            <span class="site-title">CSGO<span>SIMULATOR</span></span>
        </a>
    </header>

    <main>
        <div class="page-title"><span>Login</span></div>
        <div class="page-subtitle">Sign in to your account</div>

        <div class="form-container">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="form-submit">Login</button>
            </form>

            <div class="form-link">
                Don't have an account? <a href="Register.html">Register here</a>
            </div>
        </div>
    </main>

    <script src="MenuLogic.js"></script>
    <script src="LoginLogic.js"></script>
</body>
</html>
